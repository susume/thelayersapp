document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

==============================\n   LAYERS — Guard Family landing\n   Aesthetic: warm-light editorial canvas + dark device screens,\n   single vivid signal-green accent. Bricolage Grotesque display.\n   ============================================================ */\n\n/* ── Tokens ── */\n:root{\n  --paper:#F4F2EC;\n  --paper-2:#FBFAF5;\n  --paper-3:#ECEAE1;\n  --ink:#14181A;\n  --ink-soft:#474E4D;\n  --ink-dim:#8B918B;\n  --line:rgba(20,24,26,0.10);\n  --line-soft:rgba(20,24,26,0.06);\n\n  --green:#12C27D;\n  --green-ink:#07794A;       /* accessible green text on light */\n  --green-bright:#4DEBA3;\n  --green-wash:rgba(18,194,125,0.10);\n  --green-line:rgba(18,194,125,0.28);\n\n  /* dark device screens */\n  --screen:#0B1310;\n  --screen-2:#101A15;\n  --screen-3:#16221C;\n  --screen-line:rgba(255,255,255,0.09);\n  --screen-text:#E8EFEA;\n  --screen-mut:rgba(232,239,234,0.55);\n  --screen-dim:rgba(232,239,234,0.32);\n\n  --coral:#FF7A66;           /* used ONLY for tiny live/alert dots */\n\n  --shadow-sm:0 1px 2px rgba(20,24,26,0.05),0 4px 14px rgba(20,24,26,0.05);\n  --shadow-md:0 8px 24px rgba(20,24,26,0.08),0 2px 6px rgba(20,24,26,0.05);\n  --shadow-lg:0 30px 70px -20px rgba(11,19,16,0.45);\n  --shadow-screen:0 40px 90px -28px rgba(11,19,16,0.55),0 0 0 1px rgba(20,24,26,0.04);\n\n  --r-sm:12px; --r-md:18px; --r-lg:26px; --r-xl:34px;\n  --maxw:1200px;\n}\n\n*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}\nhtml{scroll-behavior:smooth;-webkit-text-size-adjust:100%}\nbody{\n  background:var(--paper);\n  color:var(--ink);\n  font-family:'Manrope',system-ui,sans-serif;\n  font-weight:450;\n  line-height:1.6;\n  letter-spacing:-0.005em;\n  overflow-x:hidden;\n  -webkit-font-smoothing:antialiased;\n  text-rendering:optimizeLegibility;\n}\n::selection{background:var(--green);color:#04130C}\nimg{max-width:100%;display:block}\na{color:inherit}\n\n/* paper grain / atmosphere */\nbody::before{\n  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;\n  background:\n    radial-gradient(900px 500px at 82% -8%, var(--green-wash), transparent 60%),\n    radial-gradient(700px 600px at 8% 4%, rgba(18,194,125,0.05), transparent 55%);\n}\nmain,nav,footer{position:relative;z-index:1}\n\n/* ── Type system ── */\n.display{font-family:'Bricolage Grotesque','Manrope',sans-serif;font-weight:700;letter-spacing:-0.03em;line-height:0.98}\nh1,h2,h3{font-family:'Bricolage Grotesque','Manrope',sans-serif;font-weight:700;letter-spacing:-0.025em;line-height:1.02}\n.eyebrow{\n  display:inline-flex;align-items:center;gap:8px;\n  font-family:'Space Mono',monospace;font-size:0.72rem;font-weight:700;\n  letter-spacing:0.16em;text-transform:uppercase;color:var(--green-ink);\n}\n.eyebrow::before{content:'';width:18px;height:1.5px;background:var(--green-ink);display:inline-block}\n.lead{font-size:clamp(1.05rem,1.5vw,1.28rem);color:var(--ink-soft);font-weight:450;line-height:1.55}\n\n/* ── Buttons ── */\n.btn{\n  display:inline-flex;align-items:center;gap:9px;cursor:pointer;border:none;\n  font-family:'Manrope',sans-serif;font-weight:700;font-size:0.95rem;\n  text-decoration:none;border-radius:100px;padding:14px 26px;\n  letter-spacing:-0.01em;transition:transform .22s cubic-bezier(.2,.7,.2,1),box-shadow .22s,background .2s,color .2s;\n  white-space:nowrap;\n}\n.btn svg{width:18px;height:18px}\n.btn-primary{background:var(--green);color:#04130C;box-shadow:0 1px 0 rgba(255,255,255,0.4) inset,0 10px 24px -8px rgba(18,194,125,0.6)}\n.btn-primary:hover{transform:translateY(-2px);box-shadow:0 1px 0 rgba(255,255,255,0.4) inset,0 16px 34px -8px rgba(18,194,125,0.7)}\n.btn-ink{background:var(--ink);color:var(--paper)}\n.btn-ink:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}\n.btn-ghost{background:transparent;color:var(--ink);box-shadow:inset 0 0 0 1.5px var(--line)}\n.btn-ghost:hover{box-shadow:inset 0 0 0 1.5px var(--ink);transform:translateY(-2px)}\n.btn-lg{padding:17px 32px;font-size:1.02rem}\n.btn-sm{padding:10px 18px;font-size:0.85rem}\n.btn-block{width:100%;justify-content:center}\n\n/* small green link */\n.tlink{display:inline-flex;align-items:center;gap:6px;font-weight:700;color:var(--green-ink);text-decoration:none;font-size:0.92rem}\n.tlink svg{width:16px;height:16px;transition:transform .2s}\n.tlink:hover svg{transform:translateX(3px)}\n\n/* ── Layout helpers ── */\n.wrap{max-width:var(--maxw);margin:0 auto;padding:0 32px}\n.section{padding:clamp(80px,11vw,140px) 0}\n.section-tight{padding:clamp(56px,7vw,90px) 0}\n.stack-head{max-width:680px}\n.stack-head h2{font-size:clamp(2.2rem,4.6vw,3.6rem);margin:18px 0 0}\n.stack-head .lead{margin-top:18px}\n.center{text-align:center;margin-left:auto;margin-right:auto}\n\n/* ============================================================\n   NAV + ANNOUNCE\n   ============================================================ */\n.announce{\n  display:flex;align-items:center;justify-content:center;gap:14px;flex-wrap:wrap;\n  padding:9px 48px 9px 20px;position:relative;\n  background:var(--ink);color:var(--paper);font-size:0.82rem;z-index:60;\n}\n.announce .pill{\n  font-family:'Space Mono',monospace;font-size:0.62rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;\n  background:var(--green);color:#04130C;padding:3px 9px;border-radius:100px;\n}\n.announce strong{font-weight:700}\n.announce a{color:var(--green-bright);font-weight:700;text-decoration:none;border-bottom:1px solid var(--green-line)}\n.announce .ax{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:rgba(255,255,255,0.5);cursor:pointer;font-size:1.1rem;line-height:1;padding:4px}\n.announce .ax:hover{color:#fff}\n\nnav{\n  position:sticky;top:0;z-index:50;\n  display:flex;align-items:center;justify-content:space-between;\n  padding:14px 32px;\n  background:rgba(244,242,236,0.7);backdrop-filter:saturate(1.4) blur(16px);\n  border-bottom:1px solid transparent;transition:border-color .3s,box-shadow .3s,background .3s;\n}\nnav.scrolled{border-color:var(--line);box-shadow:0 1px 0 rgba(255,255,255,0.5),var(--shadow-sm);background:rgba(244,242,236,0.85)}\n.brand{display:flex;align-items:center;gap:11px;text-decoration:none;color:var(--ink);font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:1.32rem;letter-spacing:-0.03em}\n.brand-mark{position:relative;width:30px;height:30px;display:grid;place-items:center}\n.brand-mark svg{width:30px;height:30px}\n.nav-links{display:flex;align-items:center;gap:6px}\n.nav-links a:not(.btn){color:var(--ink-soft);text-decoration:none;font-size:0.92rem;font-weight:600;padding:9px 13px;border-radius:10px;transition:color .2s,background .2s}\n.nav-links a:not(.btn):hover{color:var(--ink);background:rgba(20,24,26,0.04)}\n.nav-cta-wrap{display:flex;align-items:center;gap:10px;margin-left:8px}\n\n/* ============================================================\n   HERO\n   ============================================================ */\n.hero{position:relative;padding:clamp(46px,7vw,82px) 0 clamp(60px,8vw,96px)}\n.hero-grid{display:grid;grid-template-columns:1.04fr 0.96fr;gap:48px;align-items:center}\n.hero-badge{\n  display:inline-flex;align-items:center;gap:9px;background:var(--paper-2);\n  border:1px solid var(--line);border-radius:100px;padding:6px 8px 6px 14px;\n  font-size:0.8rem;font-weight:600;color:var(--ink-soft);box-shadow:var(--shadow-sm);\n}\n.hero-badge b{color:var(--ink);font-weight:700}\n.hero-badge .hb-tag{font-family:'Space Mono',monospace;font-size:0.62rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;background:var(--green-wash);color:var(--green-ink);padding:3px 9px;border-radius:100px}\n.hero h1{font-size:clamp(2.7rem,6vw,5rem);margin:26px 0 0}\n.hero h1 .hl{position:relative;color:var(--green-ink);white-space:nowrap}\n.hero h1 .hl svg{position:absolute;left:0;right:0;bottom:-0.12em;width:100%;height:0.34em;overflow:visible}\n.hero h1 .hl path{fill:none;stroke:var(--green);stroke-width:7;stroke-linecap:round;stroke-dasharray:1000;stroke-dashoffset:1000;animation:draw 1.1s .7s cubic-bezier(.6,.1,.2,1) forwards}\n@keyframes draw{to{stroke-dashoffset:0}}\n.hero-sub{font-size:clamp(1.05rem,1.5vw,1.22rem);color:var(--ink-soft);max-width:500px;margin-top:24px}\n.hero-actions{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-top:34px}\n.hero-reassure{display:flex;align-items:center;gap:18px;flex-wrap:wrap;margin-top:26px;color:var(--ink-dim);font-size:0.85rem;font-weight:600}\n.hero-reassure span{display:inline-flex;align-items:center;gap:7px}\n.hero-reassure svg{width:16px;height:16px;color:var(--green-ink)}\n\n/* staggered entrance */\n.enter{opacity:0;transform:translateY(20px);animation:enter .7s cubic-bezier(.2,.7,.2,1) forwards}\n.enter.d1{animation-delay:.05s}.enter.d2{animation-delay:.13s}.enter.d3{animation-delay:.21s}\n.enter.d4{animation-delay:.29s}.enter.d5{animation-delay:.37s}.enter.d6{animation-delay:.5s}\n@keyframes enter{to{opacity:1;transform:none}}\n\n/* hero visual stage */\n.hero-stage{position:relative;height:560px;display:flex;align-items:center;justify-content:center}\n.hero-stage .glow{position:absolute;width:520px;height:520px;border-radius:50%;\n  background:radial-gradient(circle,var(--green-wash),transparent 62%);filter:blur(8px);z-index:0}\n.stage-laptop{position:absolute;right:-2%;top:8%;width:74%;z-index:1;transform:rotate(2deg);animation:floatA 8s ease-in-out infinite}\n.stage-phone{position:absolute;left:-1%;bottom:-2%;width:240px;z-index:3;animation:floatB 7s ease-in-out infinite}\n.stage-chip{position:absolute;z-index:4}\n@keyframes floatA{0%,100%{transform:rotate(2deg) translateY(0)}50%{transform:rotate(2deg) translateY(-12px)}}\n@keyframes floatB{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}\n\n/* ── DEVICE: phone frame ── */\n.phone{\n  width:240px;border-radius:38px;background:#05080A;padding:9px;\n  box-shadow:var(--shadow-screen),0 0 0 1.5px rgba(0,0,0,0.6);position:relative;\n}\n.phone::after{content:'';position:absolute;top:16px;left:50%;transform:translateX(-50%);width:64px;height:18px;background:#05080A;border-radius:0 0 12px 12px;z-index:6}\n.phone-screen{\n  border-radius:30px;background:linear-gradient(180deg,var(--screen-2),var(--screen));\n  overflow:hidden;color:var(--screen-text);position:relative;aspect-ratio:9/19.2;\n}\n.ph-status{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 6px;font-size:0.62rem;font-weight:700;color:var(--screen-mut)}\n.ph-status .dots{display:flex;gap:3px;align-items:center}\n.ph-status .dots i{width:4px;height:4px;border-radius:50%;background:var(--screen-mut);display:block}\n.ph-body{padding:6px 16px 18px}\n.ph-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}\n.ph-head .who{display:flex;align-items:center;gap:9px}\n.ph-avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#2b5,#176);display:grid;place-items:center;font-weight:800;font-size:0.78rem;color:#04130C}\n.ph-head .who b{font-size:0.82rem;font-weight:700}\n.ph-head .who small{display:block;font-size:0.6rem;color:var(--screen-dim);font-weight:600}\n.ph-bell{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,0.06);display:grid;place-items:center;position:relative}\n.ph-bell svg{width:15px;height:15px;color:var(--screen-mut)}\n.ph-bell::after{content:'';position:absolute;top:6px;right:7px;width:6px;height:6px;border-radius:50%;background:var(--coral);box-shadow:0 0 0 2px var(--screen-2)}\n\n/* internet pause card */\n.ph-pause{background:linear-gradient(150deg,rgba(18,194,125,0.18),rgba(18,194,125,0.05));border:1px solid var(--green-line);border-radius:18px;padding:14px;margin-bottom:11px;position:relative;overflow:hidden}\n.ph-pause .row{display:flex;align-items:center;justify-content:space-between}\n.ph-pause .lab{display:flex;align-items:center;gap:8px}\n.ph-pause .lab svg{width:17px;height:17px;color:var(--green-bright)}\n.ph-pause .lab b{font-size:0.84rem}\n.ph-pause .state{font-family:'Space Mono',monospace;font-size:0.58rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--green-bright)}\n.ph-toggle{width:40px;height:23px;border-radius:100px;background:var(--green);position:relative;flex-shrink:0}\n.ph-toggle::after{content:'';position:absolute;top:2.5px;right:2.5px;width:18px;height:18px;border-radius:50%;background:#04130C}\n.ph-pause .hint{font-size:0.62rem;color:var(--screen-mut);margin-top:8px}\n\n/* two stat cards */\n.ph-cards{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:11px}\n.ph-mini{background:rgba(255,255,255,0.04);border:1px solid var(--screen-line);border-radius:14px;padding:11px}\n.ph-mini .t{font-size:0.58rem;color:var(--screen-dim);font-weight:700;text-transform:uppercase;letter-spacing:0.06em}\n.ring{--p:74;width:42px;height:42px;border-radius:50%;margin:7px auto 2px;\n  background:conic-gradient(var(--green-bright) calc(var(--p)*1%),rgba(255,255,255,0.08) 0);\n  display:grid;place-items:center;position:relative}\n.ring::after{content:'';position:absolute;inset:5px;border-radius:50%;background:var(--screen-2)}\n.ring b{position:relative;z-index:1;font-size:0.6rem;font-weight:800}\n.ph-mini .big{font-size:1.05rem;font-weight:800;margin-top:5px;font-family:'Bricolage Grotesque',sans-serif}\n.ph-mini .sub{font-size:0.56rem;color:var(--screen-dim);font-weight:600}\n.ph-mini .moon{width:22px;height:22px;color:var(--green-bright);margin-top:5px}\n\n/* device rows */\n.ph-dev{display:flex;align-items:center;gap:9px;padding:9px 11px;background:rgba(255,255,255,0.03);border:1px solid var(--screen-line);border-radius:12px;margin-bottom:6px}\n.ph-dev .ic{width:26px;height:26px;border-radius:8px;background:rgba(255,255,255,0.06);display:grid;place-items:center;flex-shrink:0}\n.ph-dev .ic svg{width:14px;height:14px;color:var(--screen-mut)}\n.ph-dev .nm{flex:1;font-size:0.72rem;font-weight:700}\n.ph-dev .st{font-size:0.56rem;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;display:flex;align-items:center;gap:5px;color:var(--screen-mut)}\n.ph-dev .st::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 7px var(--green)}\n.ph-dev.locked .st::before{background:var(--coral);box-shadow:0 0 7px var(--coral)}\n\n/* floating control chip near phone */\n.chip-pop{\n  position:absolute;background:var(--paper-2);border:1px solid var(--line);border-radius:14px;\n  padding:11px 14px;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:11px;z-index:5;\n}\n.chip-pop .cp-ic{width:34px;height:34px;border-radius:10px;background:var(--green-wash);display:grid;place-items:center;flex-shrink:0}\n.chip-pop .cp-ic svg{width:18px;height:18px;color:var(--green-ink)}\n.chip-pop b{font-size:0.82rem;display:block;line-height:1.2}\n.chip-pop small{font-size:0.68rem;color:var(--ink-dim)}\n.chip-1{top:6%;left:50%;animation:floatC 6s ease-in-out infinite}\n@keyframes floatC{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}\n\n/* ── DEVICE: laptop / dashboard frame ── */\n.laptop{width:100%}\n.laptop-screen{\n  background:#05080A;border-radius:16px 16px 0 0;padding:8px 8px 0;\n  box-shadow:var(--shadow-screen);\n}\n.laptop-bar{display:flex;align-items:center;gap:6px;padding:7px 10px}\n.laptop-bar .tl{display:flex;gap:6px}\n.laptop-bar .tl i{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,0.18);display:block}\n.laptop-bar .url{flex:1;margin-left:8px;background:rgba(255,255,255,0.05);border-radius:7px;height:20px;display:flex;align-items:center;padding:0 10px;font-size:0.58rem;color:var(--screen-dim);font-family:'Space Mono',monospace}\n.laptop-bar .url svg{width:10px;height:10px;margin-right:6px;color:var(--green-bright)}\n.laptop-view{background:linear-gradient(160deg,var(--screen-2),var(--screen));border-radius:9px 9px 0 0;overflow:hidden;aspect-ratio:16/10.4;color:var(--screen-text)}\n.laptop-base{height:13px;background:linear-gradient(180deg,#10130f,#05080A);border-radius:0 0 13px 13px;position:relative;box-shadow:var(--shadow-lg)}\n.laptop-base::after{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:76px;height:5px;background:rgba(255,255,255,0.06);border-radius:0 0 7px 7px}\n\n/* dashboard inner UI (used in cross-platform section too) */\n.dash{display:grid;grid-template-columns:64px 1fr;height:100%}\n.dash-rail{background:rgba(0,0,0,0.2);border-right:1px solid var(--screen-line);display:flex;flex-direction:column;align-items:center;gap:14px;padding:14px 0}\n.dash-rail .logo{width:24px;height:24px;border-radius:7px;background:var(--green);display:grid;place-items:center}\n.dash-rail .logo svg{width:15px;height:15px;color:#04130C}\n.dash-rail .ri{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;color:var(--screen-dim)}\n.dash-rail .ri.on{background:var(--green-wash);color:var(--green-bright)}\n.dash-rail .ri svg{width:16px;height:16px}\n.dash-main{padding:16px 18px;overflow:hidden}\n.dash-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}\n.dash-h b{font-size:0.92rem;font-family:'Bricolage Grotesque',sans-serif;font-weight:700}\n.dash-h .seg{display:flex;gap:4px;background:rgba(255,255,255,0.05);border-radius:9px;padding:3px}\n.dash-h .seg span{font-size:0.56rem;font-weight:700;padding:4px 9px;border-radius:6px;color:var(--screen-dim)}\n.dash-h .seg span.on{background:var(--green);color:#04130C}\n.dash-row{display:grid;grid-template-columns:1.3fr 1fr;gap:11px}\n.dash-card{background:rgba(255,255,255,0.04);border:1px solid var(--screen-line);border-radius:13px;padding:13px}\n.dash-card .ct{font-size:0.6rem;color:var(--screen-dim);font-weight:700;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:9px}\n.bars{display:flex;align-items:flex-end;gap:6px;height:58px}\n.bars i{flex:1;background:linear-gradient(180deg,var(--green-bright),var(--green));border-radius:4px 4px 0 0;display:block;opacity:0.9}\n.appline{display:flex;align-items:center;gap:8px;margin-bottom:8px}\n.appline .d{width:18px;height:18px;border-radius:6px;background:rgba(255,255,255,0.08);flex-shrink:0}\n.appline .nm{flex:1;font-size:0.62rem;font-weight:600;color:var(--screen-mut)}\n.appline .bar{width:46px;height:5px;border-radius:3px;background:rgba(255,255,255,0.08);overflow:hidden}\n.appline .bar b{display:block;height:100%;background:var(--green);border-radius:3px}\n.appline.blocked .nm{color:var(--screen-dim);text-decoration:line-through}\n.appline.blocked .tag{font-size:0.5rem;font-weight:800;letter-spacing:0.06em;color:var(--coral);text-transform:uppercase}\n\n/* ============================================================\n   MARQUEE / TRUST\n   ============================================================ */\n.trust{border-top:1px solid var(--line);border-bottom:1px solid var(--line);background:var(--paper-2)}\n.trust-inner{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:26px;padding:30px 32px;max-width:var(--maxw);margin:0 auto}\n.trust-lab{font-family:'Space Mono',monospace;font-size:0.68rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink-dim);max-width:160px;line-height:1.4}\n.trust-stats{display:flex;align-items:center;gap:clamp(22px,4vw,56px);flex-wrap:wrap}\n.tstat{display:flex;flex-direction:column;gap:2px}\n.tstat b{font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(1.6rem,2.6vw,2.2rem);font-weight:700;line-height:1;letter-spacing:-0.03em}\n.tstat span{font-size:0.78rem;color:var(--ink-soft);font-weight:600}\n.tstat .tlangs{display:block;font-family:'Space Mono',monospace;font-size:0.66rem;color:var(--ink-dim);font-weight:400;letter-spacing:0.01em;margin-top:2px}\n\n/* ============================================================\n   GENERIC PRIMITIVES\n   ============================================================ */\n.icon-tile{width:46px;height:46px;border-radius:13px;background:var(--green-wash);display:grid;place-items:center;flex-shrink:0}\n.icon-tile svg{width:23px;height:23px;color:var(--green-ink)}\n.icon-tile.ink{background:var(--ink)}\n.icon-tile.ink svg{color:var(--green-bright)}\n\n/* reveal on scroll */\n.reveal{opacity:0;transform:translateY(26px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1)}\n.reveal.in{opacity:1;transform:none}\n.rd1{transition-delay:.08s}.rd2{transition-delay:.16s}.rd3{transition-delay:.24s}.rd4{transition-delay:.32s}\n\n/* ============================================================\n   HOW IT WORKS\n   ============================================================ */\n.steps{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;margin-top:60px;position:relative}\n.step{background:var(--paper-2);border:1px solid var(--line);border-radius:var(--r-lg);padding:30px 26px;position:relative;box-shadow:var(--shadow-sm)}\n.step .num{font-family:'Space Mono',monospace;font-size:0.72rem;font-weight:700;color:var(--green-ink);letter-spacing:0.1em}\n.step h3{font-size:1.32rem;margin:14px 0 8px}\n.step p{font-size:0.92rem;color:var(--ink-soft)}\n.step .step-ic{width:44px;height:44px;border-radius:12px;background:var(--ink);display:grid;place-items:center;margin-bottom:20px}\n.step .step-ic svg{width:22px;height:22px;color:var(--green-bright)}\n.step-arrow{position:absolute;top:54px;right:-15px;z-index:2;width:26px;height:26px;border-radius:50%;background:var(--paper);border:1px solid var(--line);display:grid;place-items:center}\n.step-arrow svg{width:14px;height:14px;color:var(--ink-soft)}\n\n/* ============================================================\n   FEATURE BENTO\n   ============================================================ */\n.bento{display:grid;grid-template-columns:repeat(4,1fr);grid-auto-rows:minmax(176px,auto);gap:18px;margin-top:60px}\n.cell{background:var(--paper-2);border:1px solid var(--line);border-radius:var(--r-lg);padding:26px;position:relative;overflow:hidden;box-shadow:var(--shadow-sm);transition:transform .3s,box-shadow .3s}\n.cell:hover{transform:translateY(-3px);box-shadow:var(--shadow-md)}\n.cell h3{font-size:1.18rem;margin:16px 0 7px}\n.cell p{font-size:0.88rem;color:var(--ink-soft)}\n.cell .icon-tile{margin-bottom:2px}\n/* feature placements */\n.cell-phone{grid-column:span 2;grid-row:span 2;background:var(--screen);border-color:rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;padding:32px}\n.cell-wide{grid-column:span 2}\n.cell-tall{grid-row:span 2}\n.cell-dark{background:var(--ink);border-color:transparent}\n.cell-dark h3{color:var(--paper)}\n.cell-dark p{color:rgba(244,242,236,0.6)}\n.cell-dark .icon-tile{background:rgba(255,255,255,0.08)}\n.cell-dark .icon-tile svg{color:var(--green-bright)}\n\n/* mini schedule visual in a cell */\n.sched{display:flex;gap:5px;margin-top:16px;align-items:flex-end;height:46px}\n.sched i{flex:1;border-radius:4px;background:var(--green-wash);display:block}\n.sched i.on{background:var(--green)}\n.sched i.night{background:var(--ink)}\n\n/* block list mini */\n.blocklist{margin-top:14px;display:flex;flex-direction:column;gap:7px}\n.blocklist .bl{display:flex;align-items:center;gap:9px;font-size:0.8rem;color:var(--ink-soft);font-weight:600}\n.blocklist .bl svg{width:15px;height:15px;flex-shrink:0}\n.blocklist .bl.ban svg{color:var(--coral)}\n.blocklist .bl.ok svg{color:var(--green-ink)}\n\n/* ============================================================\n   CROSS-PLATFORM\n   ============================================================ */\n.platform{background:var(--ink);color:var(--paper);border-radius:var(--r-xl);padding:clamp(40px,5vw,64px);overflow:hidden;position:relative}\n.platform::before{content:'';position:absolute;width:600px;height:600px;border-radius:50%;top:-30%;right:-10%;background:radial-gradient(circle,rgba(18,194,125,0.16),transparent 60%)}\n.platform .eyebrow{color:var(--green-bright)}\n.platform .eyebrow::before{background:var(--green-bright)}\n.platform h2{color:var(--paper);font-size:clamp(2rem,4vw,3rem);margin:16px 0 0;max-width:620px}\n.platform .lead{color:rgba(244,242,236,0.62);margin-top:16px;max-width:540px}\n.plat-grid{display:grid;grid-template-columns:1.1fr 1fr;gap:48px;align-items:center;margin-top:48px;position:relative}\n.plat-list{display:flex;flex-direction:column;gap:6px}\n.plat-item{display:flex;align-items:center;gap:16px;padding:18px 6px;border-bottom:1px solid rgba(255,255,255,0.08)}\n.plat-item:last-child{border-bottom:none}\n.plat-item .pic{width:46px;height:46px;border-radius:12px;background:rgba(255,255,255,0.06);display:grid;place-items:center;flex-shrink:0}\n.plat-item .pic svg{width:23px;height:23px;color:var(--green-bright)}\n.plat-item b{font-size:1rem;display:block}\n.plat-item small{font-size:0.82rem;color:rgba(244,242,236,0.5)}\n.plat-item .badge{margin-left:auto;font-family:'Space Mono',monospace;font-size:0.58rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:4px 10px;border-radius:100px;color:var(--green-bright);background:rgba(18,194,125,0.14);border:1px solid var(--green-line)}\n.plat-item .badge.soon{color:rgba(244,242,236,0.5);background:rgba(255,255,255,0.05);border-color:rgba(255,255,255,0.1)}\n\n/* ============================================================\n   PRICING\n   ============================================================ */\n.price-grid{display:grid;grid-template-columns:1fr 1.18fr 1fr;gap:20px;margin-top:60px;align-items:stretch}\n.pcard{background:var(--paper-2);border:1px solid var(--line);border-radius:var(--r-lg);padding:32px;display:flex;flex-direction:column;box-shadow:var(--shadow-sm);transition:transform .3s,box-shadow .3s}\n.pcard:hover{transform:translateY(-4px);box-shadow:var(--shadow-md)}\n.pcard.feature{background:var(--ink);color:var(--paper);border-color:transparent;box-shadow:var(--shadow-lg);position:relative;overflow:hidden}\n.pcard.feature::before{content:'';position:absolute;top:-40%;left:50%;transform:translateX(-50%);width:420px;height:420px;border-radius:50%;background:radial-gradient(circle,rgba(18,194,125,0.18),transparent 62%)}\n.pcard>*{position:relative}\n.p-flag{display:inline-flex;align-self:flex-start;font-family:'Space Mono',monospace;font-size:0.6rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;background:var(--green);color:#04130C;padding:4px 11px;border-radius:100px;margin-bottom:16px}\n.p-tier{font-family:'Space Mono',monospace;font-size:0.66rem;font-weight:700;letter-spacing:0.13em;text-transform:uppercase;color:var(--ink-dim)}\n.pcard.feature .p-tier{color:rgba(244,242,236,0.5)}\n.p-name{font-size:1.6rem;font-family:'Bricolage Grotesque',sans-serif;font-weight:700;margin:5px 0 16px;letter-spacing:-0.02em}\n.p-price{display:flex;align-items:flex-start;gap:3px;margin-bottom:5px}\n.p-price .cur{font-size:1.1rem;font-weight:700;margin-top:7px}\n.p-price .amt{font-family:'Bricolage Grotesque',sans-serif;font-size:3.4rem;font-weight:700;line-height:0.9;letter-spacing:-0.04em}\n.p-price .per{align-self:flex-end;font-size:0.82rem;color:var(--ink-dim);font-weight:600;margin-bottom:8px}\n.pcard.feature .p-price .per{color:rgba(244,242,236,0.5)}\n.p-note{font-size:0.82rem;color:var(--ink-soft);margin-bottom:22px}\n.pcard.feature .p-note{color:rgba(244,242,236,0.6)}\n.p-div{height:1px;background:var(--line);margin-bottom:20px}\n.pcard.feature .p-div{background:rgba(255,255,255,0.1)}\n.p-feats{list-style:none;display:flex;flex-direction:column;gap:11px;margin-bottom:26px;flex:1}\n.p-feats li{display:flex;align-items:flex-start;gap:10px;font-size:0.9rem;color:var(--ink-soft);line-height:1.45}\n.pcard.feature .p-feats li{color:rgba(244,242,236,0.78)}\n.p-feats li svg{width:17px;height:17px;flex-shrink:0;margin-top:2px;color:var(--green-ink)}\n.pcard.feature .p-feats li svg{color:var(--green-bright)}\n.p-feats li.off{color:var(--ink-dim)}\n.p-feats li.off svg{color:var(--ink-dim)}\n\n.promise{margin-top:24px;background:var(--green-wash);border:1px solid var(--green-line);border-radius:var(--r-md);padding:22px 26px;display:flex;align-items:center;gap:18px}\n.promise .icon-tile{background:var(--paper-2)}\n.promise p{font-size:0.95rem;color:var(--ink-soft)}\n.promise b{color:var(--ink)}\n\n/* ============================================================\n   FAMILY (supporting products)\n   ============================================================ */\n.fam-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:52px}\n.fam-card{background:var(--paper-2);border:1px solid var(--line);border-radius:var(--r-lg);padding:28px;box-shadow:var(--shadow-sm);transition:transform .3s,box-shadow .3s;display:flex;flex-direction:column}\n.fam-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-md)}\n.fam-card h3{font-size:1.22rem;margin:18px 0 4px}\n.fam-tag{font-family:'Space Mono',monospace;font-size:0.6rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--green-ink)}\n.fam-card p{font-size:0.88rem;color:var(--ink-soft);margin:10px 0 18px;flex:1}\n.fam-card .tlink{margin-top:auto}\n\n/* ============================================================\n   CTA BANNER + FOOTER\n   ============================================================ */\n.cta-band{background:var(--ink);color:var(--paper);border-radius:var(--r-xl);padding:clamp(48px,7vw,90px) 32px;text-align:center;position:relative;overflow:hidden}\n.cta-band::before{content:'';position:absolute;inset:0;background:radial-gradient(700px 380px at 50% -20%,rgba(18,194,125,0.2),transparent 60%)}\n.cta-band h2{position:relative;color:var(--paper);font-size:clamp(2.2rem,5vw,4rem);max-width:780px;margin:0 auto}\n.cta-band h2 em{font-style:normal;color:var(--green-bright)}\n.cta-band .lead{position:relative;color:rgba(244,242,236,0.66);max-width:540px;margin:20px auto 0}\n.cta-band .hero-actions{position:relative;justify-content:center}\n\nfooter{background:var(--paper-2);border-top:1px solid var(--line);padding:64px 0 36px;margin-top:0}\n.foot-top{display:grid;grid-templa te-columns:1fr 1fr}\n  .announce{font-size:0.74rem;padding-right:40px}\n  .hero-stage{height:430px}\n}\n\n/* ============================================================\n   TWEAKS PANEL (vanilla)\n   ============================================================ */\n.ph-toggle{transition:background .2s}\n.ph-toggle::after{transition:transform .22s cubic-bezier(.2,.7,.2,1)}\n.ph-toggle.off::after{transform:translateX(-17px)}\n\n#tw-panel{\n  position:fixed;top:16px;right:16px;width:288px;z-index:9999;\n  background:var(--paper-2);border:1px solid var(--line);border-radius:18px;\n  box-shadow:var(--shadow-lg);font-family:'Manrope',sans-serif;color:var(--ink);\n  opacity:0;transform:translateY(-8px) scale(.98);pointer-events:none;\n  transition:opacity .22s,transform .22s;max-height:calc(100vh - 32px);overflow:auto;\n}\n#tw-panel.show{opacity:1;transform:none;pointer-events:auto}\n.tw-head{display:flex;align-items:center;justify-content:space-between;padding:15px 18px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--paper-2);z-index:1}\n.tw-head b{font-family:'Bricolage Grotesque',sans-serif;font-size:1.05rem}\n.tw-x{background:none;border:none;font-size:1.4rem;line-height:1;color:var(--ink-dim);cursor:pointer;padding:0 4px}\n.tw-x:hover{color:var(--ink)}\n.tw-body{padding:16px 18px 20px}\n.tw-sec{font-family:'Space Mono',monospace;font-size:0.62rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink-dim);margin:16px 0 10px}\n.tw-sec:first-child{margin-top:0}\n.tw-swatches{display:flex;gap:10px}\n.tw-sw{width:30px;height:30px;border-radius:50%;border:2px solid transparent;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,0.12);transition:transform .15s}\n.tw-sw:hover{transform:scale(1.1)}\n.tw-sw.on{border-color:var(--ink);box-shadow:0 0 0 2px var(--paper-2),0 0 0 4px var(--ink)}\n.tw-seg{display:flex;gap:4px;background:var(--paper-3);border-radius:11px;padding:4px}\n.tw-seg button{flex:1;border:none;background:none;font-family:'Manrope',sans-serif;font-weight:700;font-size:0.82rem;color:var(--ink-soft);padding:8px 4px;border-radius:8px;cursor:pointer;transition:background .15s,color .15s}\n.tw-seg button.on{background:var(--paper-2);color:var(--ink);box-shadow:var(--shadow-sm)}\n.tw-text,.tw-input{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-family:'Manrope',sans-serif;font-size:0.88rem;color:var(--ink);background:var(--paper);resize:none;line-height:1.45}\n.tw-text:focus,.tw-input:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px var(--green-wash)}\n.tw-hint{font-size:0.72rem;color:var(--ink-dim);margin-top:8px;line-height:1.45}\n.tw-hint code{font-family:'Space Mono',monospace;background:var(--paper-3);padding:1px 5px;border-radius:5px;font-size:0.9em}\n.tw-row{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:18px;font-size:0.88rem;font-weight:600;cursor:pointer}\n.tw-row input{width:18px;height:18px;accent-color:var(--green);cursor:pointer}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n\n<!-- ░░ ICON SPRITE (Lucide-style line icons) ░░ -->\n<svg width=\"0\" height=\"0\" style=\"position:absolute\" aria-hidden=\"true\">\n  <defs>\n    <g id=\"ico-base\"><\u002Fg>\n  <\u002Fdefs>\n  <symbol id=\"i-shield\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z\"><\u002Fpath><path d=\"m9 12 2 2 4-4\"><\u002Fpath><\u002Fsymbol>\n  <symbol id=\"i-phone\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"5\" y=\"2\" width=\"14\" height=\"20\" rx=\"2.5\"><\u002Frect><path d=\"M12 18h.01\"><\u002Fpath><\u002Fsymbol>\n  <symbol id=\"i-monitor\" viewBox=\"0 0 24 24\" fill
