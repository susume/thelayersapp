<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#111111">
<meta name="description" content="Turn your screen into a customizable LED scrolling sign">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>LED Marquee Sign</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>рҹ’Ў</text></svg>">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Press+Start+2P&family=Silkscreen&family=VT323&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #111111;
    --text-color: #ff3333;
    --glow-color: #ff3333;
    --glow-r: 255; --glow-g: 51; --glow-b: 51;
    --font-size: 120px;
    --scroll-duration: 12s;
    --dot-size: 4px;
    --dot-gap: 2px;
  }

  html { height: 100%; }

  body {
    background: var(--bg);
    overflow: hidden;
    font-family: 'Orbitron', monospace;
    height: 100vh;
    height: 100dvh;
    width: 100vw;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    -webkit-user-select: none;
  }

  body.cursor-idle { cursor: none; }

  /* в”Җв”Җ LED Display в”Җв”Җ */
  #marquee-container {
    width: 100vw;
    height: 100vh;
    height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  #marquee-container::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle, transparent 20%, var(--bg) 80%);
    opacity: 0.15;
    pointer-events: none;
    z-index: 2;
  }

  .dot-overlay {
    position: absolute;
    inset: 0;
    z-index: 3;
    pointer-events: none;
    opacity: 0.08;
    background-image:
      radial-gradient(circle, #000 var(--dot-size), transparent var(--dot-size));
    background-size: calc(var(--dot-size) + var(--dot-gap)) calc(var(--dot-size) + var(--dot-gap));
  }
  .dot-overlay.hidden { display: none; }

  #marquee-text {
    white-space: nowrap;
    font-size: var(--font-size);
    font-weight: 900;
    color: var(--text-color);
    text-shadow:
      0 0 10px var(--glow-color),
      0 0 30px var(--glow-color),
      0 0 60px var(--glow-color),
      0 0 100px var(--glow-color);
    position: absolute;
    z-index: 1;
    padding: 0 60px;
    letter-spacing: 0.05em;
  }

  .no-glow #marquee-text { text-shadow: none; }

  .mirror #marquee-text { transform: scaleX(-1); }
  .mirror.no-scroll #marquee-text { transform: translateX(-50%) scaleX(-1); }

  /* в”Җв”Җ Scroll Directions в”Җв”Җ */
  .scroll-left #marquee-text {
    animation: scrollLeft var(--scroll-duration) linear infinite;
  }
  .scroll-right #marquee-text {
    animation: scrollRight var(--scroll-duration) linear infinite;
  }
  .scroll-up #marquee-text {
    animation: scrollUp var(--scroll-duration) linear infinite;
  }
  .scroll-down #marquee-text {
    animation: scrollDown var(--scroll-duration) linear infinite;
  }
  .no-scroll #marquee-text {
    animation: pulse 2s ease-in-out infinite;
    left: 50%;
    transform: translateX(-50%);
  }

  @keyframes scrollLeft {
    from { transform: translateX(100vw); }
    to   { transform: translateX(-100%); }
  }
  @keyframes scrollRight {
    from { transform: translateX(-100%); }
    to   { transform: translateX(100vw); }
  }
  @keyframes scrollUp {
    from { transform: translateY(100vh); }
    to   { transform: translateY(-100%); }
  }
  @keyframes scrollDown {
    from { transform: translateY(-100%); }
    to   { transform: translateY(100vh); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.6; }
  }

  /* в”Җв”Җ Effects в”Җв”Җ */
  .effect-flash #marquee-text {
    animation: flashText 1s steps(1) infinite !important;
    left: 50%;
    transform: translateX(-50%) !important;
  }
  @keyframes flashText {
    0%, 49% { opacity: 1; }
    50%, 100% { opacity: 0; }
  }

  .effect-rainbow #marquee-text {
    background: linear-gradient(90deg, #ff0000, #ff8800, #ffff00, #00ff00, #0088ff, #8800ff, #ff0088, #ff0000);
    background-size: 400%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: scrollLeft var(--scroll-duration) linear infinite, rainbowShift 3s linear infinite !important;
    text-shadow: none;
    filter: drop-shadow(0 0 20px var(--glow-color));
  }
  @keyframes rainbowShift {
    from { background-position: 0% 50%; }
    to   { background-position: 400% 50%; }
  }

  /* Reduced motion */
  @media (prefers-reduced-motion: reduce) {
    #marquee-text { animation: none !important; }
    .no-scroll #marquee-text {
      left: 50%;
      transform: translateX(-50%);
    }
  }

  /* в”Җв”Җ Settings Button в”Җв”Җ */
  #settings-btn {
    position: fixed;
    top: 16px;
    right: 16px;
    z-index: 1001;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.2);
    background: rgba(30,30,30,0.85);
    color: #ccc;
    font-size: 22px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0.5;
    transition: opacity 0.3s, border-color 0.2s, transform 0.2s;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  #settings-btn:hover,
  #settings-btn:focus-visible {
    opacity: 1;
    border-color: #fff;
    color: #fff;
    outline: none;
  }
  #settings-btn[aria-expanded="true"] {
    opacity: 1;
    transform: rotate(90deg);
  }

  /* в”Җв”Җ Rotate Button в”Җв”Җ */
  #rotate-btn {
    position: fixed;
    bottom: 16px;
    right: 16px;
    z-index: 1001;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.12);
    background: rgba(30,30,30,0.5);
    color: rgba(255,255,255,0.25);
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.4s, border-color 0.2s, color 0.2s;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    padding: 0;
    line-height: 1;
  }
  body:hover #rotate-btn,
  body.settings-open #rotate-btn { opacity: 1; }
  #rotate-btn:hover,
  #rotate-btn:focus-visible {
    border-color: rgba(255,255,255,0.4);
    color: rgba(255,255,255,0.6);
    outline: none;
  }
  #rotate-btn:active { transform: scale(0.92); }

  /* в”Җв”Җ Marquee Rotation в”Җв”Җ */
  #marquee-container {
    transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    transform-origin: center center;
  }
  #marquee-container.rotate-90 {
    transform: rotate(90deg);
    width: 100vh; width: 100dvh;
    height: 100vw;
    position: absolute;
    top: 50%; left: 50%;
    margin-top: calc(-50vw);
    margin-left: calc(-50vh);
  }
  #marquee-container.rotate-180 {
    transform: rotate(180deg);
  }
  #marquee-container.rotate-270 {
    transform: rotate(270deg);
    width: 100vh; width: 100dvh;
    height: 100vw;
    position: absolute;
    top: 50%; left: 50%;
    margin-top: calc(-50vw);
    margin-left: calc(-50vh);
  }

  /* в”Җв”Җ Backdrop в”Җв”Җ */
  #settings-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 998;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  #settings-backdrop.visible {
    opacity: 1;
    pointer-events: auto;
  }

  /* в”Җв”Җ Settings Panel в”Җв”Җ */
  #settings-panel {
    position: fixed;
    top: 0;
    right: 0;
    width: 380px;
    max-width: 100vw;
    height: 100vh;
    height: 100dvh;
    background: rgba(18, 18, 22, 0.98);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    z-index: 999;
    overflow-y: auto;
    overflow-x: hidden;
    border-left: 1px solid #333;
    padding: 0 20px 40px;
    transform: translateX(100%);
    transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  }
  #settings-panel.open { transform: translateX(0); }

  #settings-panel::-webkit-scrollbar { width: 6px; }
  #settings-panel::-webkit-scrollbar-track { background: transparent; }
  #settings-panel::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }

  .panel-header {
    position: sticky;
    top: 0;
    background: rgba(18, 18, 22, 0.98);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    padding: 20px 0 16px;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid #2a2a2e;
    margin-bottom: 20px;
  }

  .panel-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 15px;
    color: #fff;
    display: flex;
    align-items: center;
    gap: 10px;
    letter-spacing: 0.1em;
  }
  .panel-title span { font-size: 20px; }

  #close-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 1px solid #444;
    background: transparent;
    color: #999;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  #close-btn:hover,
  #close-btn:focus-visible { border-color: #fff; color: #fff; outline: none; }

  /* в”Җв”Җ Setting Groups в”Җв”Җ */
  .setting-group {
    margin-bottom: 20px;
    border-bottom: 1px solid #2a2a2e;
    padding-bottom: 18px;
  }
  .setting-group:last-child { border-bottom: none; }

  .setting-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-bottom: 8px;
  }

  .setting-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
  }

  /* Text input */
  #msg-input {
    width: 100%;
    padding: 12px 14px;
    border-radius: 8px;
    border: 1px solid #333;
    background: #1a1a1e;
    color: #fff;
    font-size: 16px;
    font-family: 'Orbitron', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }
  #msg-input:focus { border-color: var(--text-color); }

  /* Range sliders */
  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 6px;
    border-radius: 3px;
    background: #2a2a2e;
    outline: none;
    cursor: pointer;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--text-color);
    cursor: pointer;
    box-shadow: 0 0 8px var(--glow-color);
  }
  input[type="range"]::-moz-range-thumb {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--text-color);
    cursor: pointer;
    border: none;
  }
  input[type="range"]:focus-visible::-webkit-slider-thumb {
    outline: 2px solid #fff;
    outline-offset: 2px;
  }

  .range-value {
    font-family: 'VT323', monospace;
    font-size: 18px;
    color: var(--text-color);
    min-width: 52px;
    text-align: right;
  }

  /* Color pickers */
  input[type="color"] {
    -webkit-appearance: none;
    width: 44px;
    height: 36px;
    border: 2px solid #444;
    border-radius: 6px;
    background: none;
    cursor: pointer;
    padding: 2px;
  }
  input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
  input[type="color"]::-webkit-color-swatch { border-radius: 3px; border: none; }

  .color-label {
    font-family: 'VT323', monospace;
    font-size: 16px;
    color: #aaa;
    flex: 1;
  }

  /* Button groups */
  .btn-group {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .btn-option {
    padding: 8px 14px;
    border-radius: 6px;
    border: 1px solid #333;
    background: #1a1a1e;
    color: #999;
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.05em;
  }
  .btn-option:hover { border-color: #666; color: #fff; }
  .btn-option:focus-visible { outline: 2px solid var(--text-color); outline-offset: 1px; }
  .btn-option.active {
    border-color: var(--text-color);
    color: var(--text-color);
    background: rgba(var(--glow-r), var(--glow-g), var(--glow-b), 0.1);
    box-shadow: 0 0 10px rgba(var(--glow-r), var(--glow-g), var(--glow-b), 0.15);
  }

  /* Theme presets */
  .theme-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  .theme-swatch {
    aspect-ratio: 1;
    border-radius: 8px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    position: relative;
  }
  .theme-swatch:hover { transform: scale(1.08); }
  .theme-swatch:focus-visible { outline: 2px solid #fff; outline-offset: 2px; }
  .theme-swatch.active { border-color: #fff; box-shadow: 0 0 12px rgba(255,255,255,0.3); }
  .theme-swatch .swatch-icon { font-size: 18px; }
  .theme-swatch .swatch-name {
    font-size: 9px;
    font-family: 'Orbitron', sans-serif;
    color: rgba(255,255,255,0.7);
    letter-spacing: 0.05em;
  }

  /* Toggle switch (accessible) */
  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .toggle-label {
    font-family: 'VT323', monospace;
    font-size: 17px;
    color: #aaa;
  }
  .toggle {
    position: relative;
    width: 48px;
    height: 26px;
    border-radius: 13px;
    border: none;
    background: #2a2a2e;
    cursor: pointer;
    transition: background 0.2s;
    padding: 0;
  }
  .toggle[aria-checked="true"] { background: var(--text-color); }
  .toggle::after {
    content: '';
    position: absolute;
    top: 3px;
    left: 3px;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #fff;
    transition: transform 0.2s;
  }
  .toggle[aria-checked="true"]::after { transform: translateX(22px); }
  .toggle:focus-visible { outline: 2px solid #fff; outline-offset: 2px; }

  /* Action buttons */
  .action-btn {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #333;
    background: #1a1a1e;
    color: #ccc;
    font-family: 'Orbitron', sans-serif;
    font-size: 12px;
    cursor: pointer;
    letter-spacing: 0.1em;
    transition: all 0.2s;
    margin-bottom: 8px;
  }
  .action-btn:hover { border-color: var(--text-color); color: #fff; background: rgba(var(--glow-r), var(--glow-g), var(--glow-b), 0.08); }
  .action-btn:focus-visible { outline: 2px solid var(--text-color); outline-offset: 1px; }

  /* в”Җв”Җ Inline images в”Җв”Җ */
  #marquee-text img.marquee-img {
    height: 1em;
    width: auto;
    vertical-align: middle;
    display: inline-block;
    margin: 0 0.15em;
    object-fit: contain;
    filter: drop-shadow(0 0 8px var(--glow-color));
  }

  /* Image manager in settings */
  .img-upload-btn {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 2px dashed #444;
    background: transparent;
    color: #888;
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    cursor: pointer;
    letter-spacing: 0.1em;
    transition: all 0.2s;
    margin-bottom: 10px;
  }
  .img-upload-btn:hover {
    border-color: var(--text-color);
    color: var(--text-color);
  }

  .img-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .img-thumb {
    position: relative;
    width: 64px;
    height: 64px;
    border-radius: 6px;
    overflow: hidden;
    border: 1px solid #333;
    background: #1a1a1e;
    cursor: grab;
  }
  .img-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .img-thumb .img-remove {
    position: absolute;
    top: 2px;
    right: 2px;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: none;
    background: rgba(0,0,0,0.7);
    color: #ff4444;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.15s;
    line-height: 1;
  }
  .img-thumb:hover .img-remove { opacity: 1; }
  .img-thumb .img-position {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(0,0,0,0.7);
    color: #aaa;
    font-size: 8px;
    font-family: 'Orbitron', sans-serif;
    text-align: center;
    padding: 2px;
    letter-spacing: 0.05em;
  }

  .img-placement-row {
    display: flex;
    gap: 6px;
    margin-bottom: 10px;
  }

  .img-hint {
    font-family: 'VT323', monospace;
    font-size: 14px;
    color: #555;
    margin-top: 6px;
  }

  /* в”Җв”Җ Emoji Picker в”Җв”Җ */
  .emoji-toggle-btn {
    width: 100%;
    padding: 8px;
    border-radius: 8px;
    border: 1px solid #333;
    background: #1a1a1e;
    color: #999;
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.05em;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 8px;
  }
  .emoji-toggle-btn:hover { border-color: #666; color: #fff; }
  .emoji-toggle-btn .emoji-icon { font-size: 16px; }

  .emoji-panel {
    display: none;
    margin-top: 10px;
    border: 1px solid #2a2a2e;
    border-radius: 8px;
    background: #151518;
    overflow: hidden;
  }
  .emoji-panel.open { display: block; }

  .emoji-categories {
    display: flex;
    overflow-x: auto;
    border-bottom: 1px solid #2a2a2e;
    padding: 0;
    scrollbar-width: none;
  }
  .emoji-categories::-webkit-scrollbar { display: none; }

  .emoji-cat-btn {
    flex-shrink: 0;
    padding: 8px 10px;
    border: none;
    background: transparent;
    font-size: 18px;
    cursor: pointer;
    transition: background 0.15s;
    border-bottom: 2px solid transparent;
    line-height: 1;
  }
  .emoji-cat-btn:hover { background: rgba(255,255,255,0.05); }
  .emoji-cat-btn.active {
    background: rgba(255,255,255,0.08);
    border-bottom-color: var(--text-color);
  }

  .emoji-search {
    width: 100%;
    padding: 8px 10px;
    border: none;
    border-bottom: 1px solid #2a2a2e;
    background: #1a1a1e;
    color: #fff;
    font-size: 13px;
    font-family: 'Orbitron', sans-serif;
    outline: none;
  }
  .emoji-search::placeholder { color: #555; }

  .emoji-grid {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 2px;
    padding: 8px;
    max-height: 200px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: #333 transparent;
  }
  .emoji-grid::-webkit-scrollbar { width: 4px; }
  .emoji-grid::-webkit-scrollbar-track { background: transparent; }
  .emoji-grid::-webkit-scrollbar-thumb { background: #444; border-radius: 2px; }

  .emoji-btn {
    width: 100%;
    aspect-ratio: 1;
    border: none;
    background: transparent;
    font-size: 22px;
    cursor: pointer;
    border-radius: 6px;
    transition: background 0.1s, transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    padding: 0;
  }
  .emoji-btn:hover {
    background: rgba(255,255,255,0.1);
    transform: scale(1.15);
  }

  .emoji-empty {
    grid-column: 1 / -1;
    text-align: center;
    padding: 16px;
    color: #555;
    font-family: 'VT323', monospace;
    font-size: 15px;
  }

  /* Wake lock indicator */
  #wake-indicator {
    position: fixed;
    bottom: 12px;
    left: 12px;
    z-index: 1001;
    font-family: 'VT323', monospace;
    font-size: 14px;
    color: rgba(255,255,255,0.3);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.5s;
  }
  body:hover #wake-indicator,
  body.settings-open #wake-indicator { opacity: 1; }

  /* Mobile */
  @media (max-width: 600px) {
    :root { --font-size: 60px; }
    #settings-panel { width: 100vw; }
    #settings-btn { opacity: 0.7; }
  }
  @media (max-height: 500px) {
    :root { --font-size: 50px; }
  }
</style>
</head>
<body>

  <div class="dot-overlay" id="dot-overlay"></div>
  <div id="marquee-text">HELLO WORLD</div>
</div>

<div id="settings-panel" role="dialog" aria-label="LED Sign Settings">
  <div class="panel-header">
    <div class="panel-title"><span>вҡҷ</span> SETTINGS</div>
    <button id="close-btn" aria-label="Close settings">вң•</button>
  </div>

  <!-- Message -->
  <div class="setting-group">
    <label class="setting-label" for="msg-input">Message</label>
    <input type="text" id="msg-input" value="HELLO WORLD" maxlength="200" placeholder="Type your message..." autocomplete="off">
  </div>

  <!-- Emoji Picker -->
  <div class="setting-group">
    <div class="setting-label">Emoji</div>
    <button class="emoji-toggle-btn" id="emoji-toggle">
      <span class="emoji-icon">рҹҳҖ</span> INSERT EMOJI
    </button>
    <div class="emoji-panel" id="emoji-panel">
      <div class="emoji-categories" id="emoji-cats"></div>
      <input type="text" class="emoji-search" id="emoji-search" placeholder="Search emoji..." autocomplete="off">
      <div class="emoji-grid" id="emoji-grid"></div>
    </div>
  </div>

  <!-- Images -->
  <div class="setting-group">
    <div class="setting-label">Images</div>
    <div class="img-placement-row">
      <button class="btn-option active" role="radio" aria-checked="true" data-placement="after" id="img-place-after">After text</button>
      <button class="btn-option" role="radio" aria-checked="false" data-placement="before" id="img-place-before">Before text</button>
      <button class="btn-option" role="radio" aria-checked="false" data-placement="only" id="img-place-only">Images only</button>
    </div>
    <button class="img-upload-btn" id="btn-add-img" aria-label="Add image">+ ADD IMAGE</button>
    <input type="file" id="img-file-input" accept="image/*" multiple hidden>
    <div class="img-list" id="img-list"></div>
    <div class="img-hint" id="img-hint"></div>
  </div>

  <!-- Theme Presets -->
  <div class="setting-group">
    <div class="setting-label" id="theme-label">Theme Presets</div>
    <div class="theme-grid" id="theme-grid" role="radiogroup" aria-labelledby="theme-label"></div>
  </div>

  <!-- Colors -->
  <div class="setting-group">
    <div class="setting-label">Colors</div>
    <div class="setting-row">
      <input type="color" id="text-color" value="#ff3333" aria-label="Text color">
      <span class="color-label">Text</span>
    </div>
    <div class="setting-row">
      <input type="color" id="glow-color" value="#ff3333" aria-label="Glow color">
      <span class="color-label">Glow</span>
    </div>
    <div class="setting-row">
      <input type="color" id="bg-color" value="#111111" aria-label="Background color">
      <span class="color-label">Background</span>
    </div>
  </div>

  <!-- Font -->
  <div class="setting-group">
    <div class="setting-label" id="font-label">Font</div>
    <div class="btn-group" id="font-group" role="radiogroup" aria-labelledby="font-label">
      <button class="btn-option active" role="radio" aria-checked="true" data-font="'Orbitron', sans-serif">Orbitron</button>
      <button class="btn-option" role="radio" aria-checked="false" data-font="'Press Start 2P', monospace">Pixel</button>
      <button class="btn-option" role="radio" aria-checked="false" data-font="'VT323', monospace">VT323</button>
      <button class="btn-option" role="radio" aria-checked="false" data-font="'Silkscreen', sans-serif">Silk</button>
      <button class="btn-option" role="radio" aria-checked="false" data-font="Arial Black, sans-serif">Bold</button>
      <button class="btn-option" role="radio" aria-checked="false" data-font="'Courier New', monospace">Mono</button>
    </div>
  </div>

  <!-- Text Size -->
  <div class="setting-group">
    <label class="setting-label" for="font-size">Text Size</label>
    <div class="setting-row">
      <input type="range" id="font-size" min="30" max="300" value="120" aria-label="Text size">
      <span class="range-value" id="font-size-val">120px</span>
    </div>
  </div>

  <!-- Speed -->
  <div class="setting-group">
    <label class="setting-label" for="scroll-speed">Scroll Speed</label>
    <div class="setting-row">
      <input type="range" id="scroll-speed" min="1" max="100" value="55" aria-label="Scroll speed">

  <!-- Direction -->
  <div class="setting-group">
    <div class="setting-label" id="dir-label">Scroll Direction</div>
    <div class="btn-group" id="dir-group" role="radiogroup" aria-labelledby="dir-label">
      <button class="btn-option active" role="radio" aria-checked="true" data-dir="scroll-left">вҶҗ Left</button>
      <button class="btn-option" role="radio" aria-checked="false" data-dir="scroll-right">Right вҶ’</button>
      <button class="btn-option" role="radio" aria-checked="false" data-dir="scroll-up">вҶ‘ Up</button>
      <button class="btn-option" role="radio" aria-checked="false" data-dir="scroll-down">Down вҶ“</button>
      <button class="btn-option" role="radio" aria-checked="false" data-dir="no-scroll">Static</button>
    </div>
  </div>

  <!-- Effects -->
  <div class="setting-group">
    <div class="setting-label" id="effect-label">Special Effect</div>
    <div class="btn-group" id="effect-group" role="radiogroup" aria-labelledby="effect-label">
      <button class="btn-option active" role="radio" aria-checked="true" data-effect="none">None</button>
      <button class="btn-option" role="radio" aria-checked="false" data-effect="flash">Flash</button>
      <button class="btn-option" role="radio" aria-checked="false" data-effect="rainbow">Rainbow</button>
    </div>
  </div>

  <!-- Display Options -->
  <div class="setting-group">
    <div class="setting-label">Display Options</div>
    <div class="toggle-row">
      <span class="toggle-label" id="lbl-dots">LED Dot Grid</span>
      <button class="toggle" role="switch" aria-checked="true" aria-labelledby="lbl-dots" data-key="dots"></button>
    </div>
    <div class="toggle-row">
      <span class="toggle-label" id="lbl-glow">Glow Effect</span>
      <button class="toggle" role="switch" aria-checked="true" aria-labelledby="lbl-glow" data-key="glow"></button>
    </div>
    <div class="toggle-row">
      <span class="toggle-label" id="lbl-bold">Bold Text</span>
      <button class="toggle" role="switch" aria-checked="true" aria-labelledby="lbl-bold" data-key="bold"></button>
    </div>
    <div class="toggle-row">
      <span class="toggle-label" id="lbl-upper">Uppercase</span>
      <button class="toggle" role="switch" aria-checked="true" aria-labelledby="lbl-upper" data-key="upper"></button>
    </div>
    <div class="toggle-row">
      <span class="toggle-label" id="lbl-mirror">Mirror / Flip</span>
      <button class="toggle" role="switch" aria-checked="false" aria-labelledby="lbl-mirror" data-key="mirror"></button>
    </div>
  </div>

  <!-- Letter Spacing -->
  <div class="setting-group">
    <label class="setting-label" for="letter-spacing">Letter Spacing</label>
    <div class="setting-row">
      <input type="range" id="letter-spacing" min="0" max="50" value="2" aria-label="Letter spacing">
      <span class="range-value" id="letter-spacing-val">2px</span>
    </div>
  </div>

  <!-- Actions -->
  <div class="setting-group">
    <button class="action-btn" id="btn-fullscreen">вӣ¶ FULLSCREEN</button>
    <button class="action-btn" id="btn-wakelock">вҳҖ KEEP SCREEN ON</button>
    <button class="action-btn" id="btn-reset">вҶә RESET TO DEFAULT</button>
  </div>
</div>

<div id="wake-indicator"></div>

<script>
const $ = id => document.getElementById(id);
const marqueeText = $('marquee-text');
const container = $('marquee-container');
const panel = $('settings-panel');
const backdrop = $('settings-backdrop');
const dotOverlay = $('dot-overlay');
const settingsBtn = $('settings-btn');

let state = {
  dots: true,
  glow: true,
  bold: true,
  upper: true,
  mirror: false,
  effect: 'none',
  dir: 'scroll-left'
};

let wakeLock = null;
let cursorTimer = null;
let saveTimer = null;
let images = [];
let imgPlacement = 'after';
let rotation = 0;

// в”Җв”Җ Speed mapping: slider 1-100 вҶ’ duration in seconds в”Җв”Җ
// slider 1 = 40s (slowest), slider 100 = 2s (fastest)
function speedToDuration(v) {
  return Math.round((40 - (v / 100) * 38) * 10) / 10;
}
function durationToSpeed(d) {
  return Math.round(((40 - d) / 38) * 100);
}
function speedLabel(v) {
  if (v <= 15) return 'Crawl';
  if (v <= 30) return 'Slow';
  if (v <= 50) return 'Medium';
  if (v <= 70) return 'Fast';
  if (v <= 85) return 'Rapid';
  return 'Blazing';
}

// в”Җв”Җ Theme Presets в”Җв”Җ
const themes = [
  { name: 'Red',    bg: '#111111', color: '#ff3333' },
  { name: 'Green',  bg: '#0a0f0a', color: '#33ff33' },
  { name: 'Amber',  bg: '#110e05', color: '#ffaa00' },
  { name: 'Blue',   bg: '#0a0a1a', color: '#3399ff' },
  { name: 'Cyan',   bg: '#051515', color: '#00ffdd' },
  { name: 'Pink',   bg: '#150a12', color: '#ff44aa' },
  { name: 'Purple', bg: '#100a18', color: '#aa55ff' },
  { name: 'White',  bg: '#111111', color: '#ffffff' },
  { name: 'Gold',   bg: '#111008', color: '#ffd700' },
  { name: 'Lime',   bg: '#080f05', color: '#aaff00' },
  { name: 'Ice',    bg: '#0a1020', color: '#88ccff' },
  { name: 'Lava',   bg: '#1a0800', color: '#ff6600' },
];

const themeGrid = $('theme-grid');
themes.forEach((t, i) => {
  const el = document.createElement('button');
  el.className = 'theme-swatch' + (i === 0 ? ' active' : '');
  el.style.background = t.bg;
  el.style.color = t.color;
  el.style.boxShadow = `inset 0 0 20px ${t.color}33`;
  el.setAttribute('role', 'radio');
  el.setAttribute('aria-checked', i === 0 ? 'true' : 'false');
  el.setAttribute('aria-label', t.name + ' theme');
  el.innerHTML = `<span class="swatch-icon" style="text-shadow:0 0 6px ${t.color}">в—Ҹ</span><span class="swatch-name">${t.name}</span>`;
  el.addEventListener('click', () => applyTheme(t, el));
  themeGrid.appendChild(el);
});

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return { r, g, b };
}

function setColors(textColor, glowColor, bgColor) {
  const root = document.documentElement.style;
  root.setProperty('--text-color', textColor);
  root.setProperty('--glow-color', glowColor);
  root.setProperty('--bg', bgColor);
  const rgb = hexToRgb(glowColor);
  root.setProperty('--glow-r', rgb.r);
  root.setProperty('--glow-g', rgb.g);
  root.setProperty('--glow-b', rgb.b);
  document.body.style.background = bgColor;
  document.querySelector('meta[name="theme-color"]').content = bgColor;
}

function applyTheme(t, el) {
  themeGrid.querySelectorAll('.theme-swatch').forEach(s => {
    s.classList.remove('active');
    s.setAttribute('aria-checked', 'false');
  });
  el.classList.add('active');
  el.setAttribute('aria-checked', 'true');
  setColors(t.color, t.color, t.bg);
  $('text-color').value = t.color;
  $('glow-color').value = t.color;
  $('bg-color').value = t.bg;
  scheduleSave();
}

// в”Җв”Җ Settings Panel в”Җв”Җ
function openSettings() {
  panel.classList.add('open');
  backdrop.classList.add('visible');
  settingsBtn.setAttribute('aria-expanded', 'true');
  document.body.classList.add('settings-open');
  $('msg-input').focus();
}

function closeSettings() {
  panel.classList.remove('open');
  backdrop.classList.remove('visible');
  settingsBtn.setAttribute('aria-expanded', 'false');
  document.body.classList.remove('settings-open');
  settingsBtn.focus();
}

function toggleSettings() {
  panel.classList.contains('open') ? closeSettings() : openSettings();
}

settingsBtn.addEventListener('click', toggleSettings);
$('close-btn').addEventListener('click', closeSettings);
backdrop.addEventListener('click', closeSettings);

document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && panel.classList.contains('open')) closeSettings();
});

// в”Җв”Җ Cursor auto-hide в”Җв”Җ
function resetCursorTimer() {
  document.body.classList.remove('cursor-idle');
  clearTimeout(cursorTimer);
  if (!panel.classList.contains('open')) {
    cursorTimer = setTimeout(() => document.body.classList.add('cursor-idle'), 3000);
  }
}
document.addEventListener('mousemove', resetCursorTimer);
document.addEventListener('mousedown', resetCursorTimer);
resetCursorTimer();

// в”Җв”Җ Message Input в”Җв”Җ
$('msg-input').addEventListener('input', e => {
  updateDisplayText(e.target.value);
  restartAnimation();
  scheduleSave();
});

function updateDisplayText(msg) {
  renderMarquee(msg);
}

// в”Җв”Җ Colors в”Җв”Җ
$('text-color').addEventListener('input', e => {
  clearActiveTheme();
  setColors(e.target.value, $('glow-color').value, $('bg-color').value);
  scheduleSave();
});
$('glow-color').addEventListener('input', e => {
  clearActiveTheme();
  setColors($('text-color').value, e.target.value, $('bg-color').value);
  scheduleSave();
});
$('bg-color').addEventListener('input', e => {
  clearActiveTheme();
  setColors($('text-color').value, $('glow-color').value, e.target.value);
  scheduleSave();
});

function clearActiveTheme() {
  themeGrid.querySelectorAll('.theme-swatch').forEach(s => {
    s.classList.remove('active');
    s.setAttribute('aria-checked', 'false');
  });
}

// в”Җв”Җ Radio Button Groups в”Җв”Җ
function setupRadioGroup(groupId, callback) {
  const group = $(groupId);
  group.addEventListener('click', e => {
    const btn = e.target.closest('.btn-option');
    if (!btn) return;
    group.querySelectorAll('.btn-option').forEach(b => {
      b.classList.remove('active');
      b.setAttribute('aria-checked', 'false');
    });
    btn.classList.add('active');
    btn.setAttribute('aria-checked', 'true');
    callback(btn);
    scheduleSave();
  });
}

setupRadioGroup('font-group', btn => {
  marqueeText.style.fontFamily = btn.dataset.font;
});

setupRadioGroup('dir-group', btn => {
  state.dir = btn.dataset.dir;
  applyClasses();
});

setupRadioGroup('effect-group', btn => {
  state.effect = btn.dataset.effect;
  applyClasses();
});

// в”Җв”Җ Sliders в”Җв”Җ
$('font-size').addEventListener('input', e => {
  document.documentElement.style.setProperty('--font-size', e.target.value + 'px');
  $('font-size-val').textContent = e.target.value + 'px';
  scheduleSave();
});

$('scroll-speed').addEventListener('input', e => {
  const v = parseInt(e.target.value);
  const dur = speedToDuration(v);
  document.documentElement.style.setProperty('--scroll-duration', dur + 's');
  $('scroll-speed-val').textContent = speedLabel(v);
  restartAnimation();
  scheduleSave();
});

$('letter-spacing').addEventListener('input', e => {
  marqueeText.style.letterSpacing = e.target.value + 'px';
  $('letter-spacing-val').textContent = e.target.value + 'px';
  scheduleSave();
});

// в”Җв”Җ Toggle Switches в”Җв”Җ
document.querySelectorAll('.toggle[role="switch"]').forEach(toggle => {
  toggle.addEventListener('click', () => {
    const key = toggle.dataset.key;
    const isOn = toggle.getAttribute('aria-checked') === 'true';
    toggle.setAttribute('aria-checked', !isOn);
    state[key] = !isOn;
    applyToggle(key);
    scheduleSave();
  });
  toggle.addEventListener('keydown', e => {
    if (e.key === ' ' || e.key === 'Enter') {
      e.preventDefault();
      toggle.click();
    }
  });
});

function applyToggle(key) {
  switch (key) {
    case 'dots':
      dotOverlay.classList.toggle('hidden', !state.dots);
      break;
    case 'glow':
      container.classList.toggle('no-glow', !state.glow);
      break;
    case 'bold':
      marqueeText.style.fontWeight = state.bold ? '900' : '400';
      break;
    case 'upper':
      updateDisplayText($('msg-input').value);
      break;
    case 'mirror':
      applyClasses();
      break;
  }
}

// в”Җв”Җ Apply CSS Classes в”Җв”Җ
function applyClasses() {
  const classes = [state.dir];
  if (state.effect !== 'none') classes.push('effect-' + state.effect);
  if (state.mirror) classes.push('mirror');
  if (!state.glow) classes.push('no-glow');
  if (rotation) classes.push('rotate-' + rotation);
  container.className = classes.join(' ');
  restartAnimation();
}

function restartAnimation() {
  marqueeText.style.animation = 'none';
  void marqueeText.offsetHeight;
  marqueeText.style.animation = '';
}

// в”Җв”Җ Rotate Display в”Җв”Җ
const rotateSteps = [0, 90, 180, 270];

function applyRotation() {
  container.classList.remove('rotate-90', 'rotate-180', 'rotate-270');
  if (rotation) container.classList.add('rotate-' + rotation);
}

$('rotate-btn').addEventListener('click', () => {
  const idx = (rotateSteps.indexOf(rotation) + 1) % rotateSteps.length;
  rotation = rotateSteps[idx];
  applyRotation();
  scheduleSave();
});

// в”Җв”Җ Screen Wake Lock в”Җв”Җ
async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      wakeLock = await navigator.wakeLock.request('screen');
      wakeLock.addEventListener('release', () => {
        wakeLock = null;
        updateWakeUI();
      });
      updateWakeUI();
    }
  } catch (e) {
    updateWakeUI();
  }
}

async function toggleWakeLock() {
  if (wakeLock) {
    await wakeLock.release();
    wakeLock = null;
  } else {
    await requestWakeLock();
  }
  updateWakeUI();
}

function updateWakeUI() {
  const active = !!wakeLock;
  const btn = $('btn-wakelock');
  const indicator = $('wake-indicator');
  if (active) {
    btn.textContent = 'вҳҖ SCREEN STAYS ON';
    btn.style.borderColor = 'var(--text-color)';
    btn.style.color = 'var(--text-color)';
    indicator.textContent = 'вҳҖ Screen lock active';
  } else {
    btn.textContent = 'вҳҖ KEEP SCREEN ON';
    btn.style.borderColor = '';
    btn.style.color = '';
    indicator.textContent = '';
  }
}

document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && !wakeLock && $('btn-wakelock').style.color) {
    requestWakeLock();
  }
});

$('btn-wakelock').addEventListener('click', toggleWakeLock);

// в”Җв”Җ Fullscreen в”Җв”Җ
$('btn-fullscreen').addEventListener('click', () => {
  const el = document.documentElement;
  if (!document.fullscreenElement) {
    (el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen).call(el);
  } else {
    (document.exitFullscreen || document.webkitExitFullscreen || document.msExitFullscreen).call(document);
  }
  closeSettings();
});

// в”Җв”Җ Reset в”Җв”Җ
$('btn-reset').addEventListener('click', () => {
  $('msg-input').value = 'HELLO WORLD';
  marqueeText.textContent = 'HELLO WORLD';
  marqueeText.style.fontFamily = '';
  marqueeText.style.fontWeight = '900';
  marqueeText.style.letterSpacing = '';

  setColors('#ff3333', '#ff3333', '#111111');
  $('text-color').value = '#ff3333';
  $('glow-color').value = '#ff3333';
  $('bg-color').value = '#111111';

  $('font-size').value = 120;
  $('font-size-val').textContent = '120px';
  document.documentElement.style.setProperty('--font-size', '120px');

  $('scroll-speed').value = 55;
  $('scroll-speed-val').textContent = 'Medium';
  document.documentElement.style.setProperty('--scroll-duration', '12s');

  $('letter-spacing').value = 2;
  $('letter-spacing-val').textContent = '2px';

  ['font-group', 'dir-group', 'effect-group'].forEach(gid => {
    $(gid).querySelectorAll('.btn-option').forEach((b, i) => {
      b.classList.toggle('active', i === 0);
      b.setAttribute('aria-checked', i === 0 ? 'true' : 'false');
    });
  });

  themeGrid.querySelectorAll('.theme-swatch').forEach((s, i) => {
    s.classList.toggle('active', i === 0);
    s.setAttribute('aria-checked', i === 0 ? 'true' : 'false');
  });

  state = { dots: true, glow: true, bold: true, upper: true, mirror: false, effect: 'none', dir: 'scroll-left' };

  document.querySelectorAll('.toggle[role="switch"]').forEach(t => {
    const on = state[t.dataset.key];
    t.setAttribute('aria-checked', on);
  });

  images = [];
  imgPlacement = 'after';
  rotation = 0;
  renderImageList();
  document.querySelectorAll('.img-placement-row .btn-option').forEach((b, i) => {
    b.classList.toggle('active', i === 0);
    b.setAttribute('aria-checked', i === 0 ? 'true' : 'false');
  });

  dotOverlay.classList.remove('hidden');
  container.className = 'scroll-left';
  renderMarquee();
  restartAnimation();
  scheduleSave();
});

const catIcons = {
  'Smileys': 'рҹҳҖ', 'Hearts': 'вқӨпёҸ', 'Hands': 'рҹ‘Ӣ', 'People': 'рҹ§‘',
  'Animals': 'рҹҗ¶', 'Food': 'рҹҚ”', 'Travel': 'рҹҡ—', 'Objects': 'рҹ’Ў',
  'Symbols': 'вӯҗ', 'Flags': 'рҹҸіпёҸ'
};

let currentCat = 'Smileys';

function buildEmojiPicker() {
  const catsEl = $('emoji-cats');
  const gridEl = $('emoji-grid');

  Object.keys(emojiData).forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'emoji-cat-btn' + (cat === currentCat ? ' active' : '');
    btn.textContent = catIcons[cat];
    btn.setAttribute('aria-label', cat);
    btn.setAttribute('title', cat);
    btn.addEventListener('click', () => {
      catsEl.querySelectorAll('.emoji-cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentCat = cat;
      $('emoji-search').value = '';
      renderEmojiGrid(emojiData[cat]);
    });
    catsEl.appendChild(btn);
  });

  renderEmojiGrid(emojiData[currentCat]);
}

function renderEmojiGrid(emojis) {
  const gridEl = $('emoji-grid');
  gridEl.innerHTML = '';
  if (!emojis.length) {
    gridEl.innerHTML = '<div class="emoji-empty">No emoji found</div>';
    return;
  }
  emojis.forEach(emoji => {
    const btn = document.createElement('button');
    btn.className = 'emoji-btn';
    btn.textContent = emoji;
    btn.setAttribute('aria-label', emoji);
    btn.addEventListener('click', () => insertEmoji(emoji));
    gridEl.appendChild(btn);
  });
}

function insertEmoji(emoji) {
  const input = $('msg-input');
  const start = input.selectionStart;
  const end = input.selectionEnd;
  const val = input.value;
  input.value = val.slice(0, start) + emoji + val.slice(end);
  const pos = start + emoji.length;
  input.setSelectionRange(pos, pos);
  input.focus();
  updateDisplayText(input.value);
  restartAnimation();
  scheduleSave();
}

$('emoji-toggle').addEventListener('click', () => {
  $('emoji-panel').classList.toggle('open');
  if ($('emoji-panel').classList.contains('open')) {
    $('emoji-search').focus();
  }
});

$('emoji-search').addEventListener('input', e => {
  const q = e.target.value.toLowerCase().trim();
  if (!q) {
    $('emoji-cats').querySelectorAll('.emoji-cat-btn').forEach((b, i) => {
      b.classList.toggle('active', Object.keys(emojiData)[i] === currentCat);
    });
    renderEmojiGrid(emojiData[currentCat]);
    return;
  }
  $('emoji-cats').querySelectorAll('.emoji-cat-btn').forEach(b => b.classList.remove('active'));
  const all = [];
  Object.entries(emojiData).forEach(([cat, emojis]) => {
    if (cat.toLowerCase().includes(q)) {
      all.push(...emojis);
    }
  });
  if (!all.length) {
    const flat = Object.values(emojiData).flat();
    renderEmojiGrid(flat.filter(e => e.includes(q)));
  } else {
    renderEmojiGrid(all);
  }
});

// в”Җв”Җ Image Management в”Җв”Җ
const MAX_IMAGES = 10;
const MAX_IMG_SIZE = 200 * 1024;

function renderMarquee(msg) {
  if (!msg) msg = $('msg-input').value;
  const text = state.upper ? msg.toUpperCase() : msg;
  const imgHtml = images.map(src =>
    `<img class="marquee-img" src="${src}" alt="" draggable="false">`
  ).join('');

  if (!images.length) {
    marqueeText.innerHTML = '';
    marqueeText.textContent = text;
    return;
  }

  const escaped = document.createElement('span');
  escaped.textContent = text;
  const safeText = escaped.innerHTML;

  switch (imgPlacement) {
    case 'before':
      marqueeText.innerHTML = imgHtml + ' ' + safeText;
      break;
    case 'only':
      marqueeText.innerHTML = imgHtml;
      break;
    default:
      marqueeText.innerHTML = safeText + ' ' + imgHtml;
  }
}

function resizeImage(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let w = img.width, h = img.height;
        const maxDim = 256;
        if (w > maxDim || h > maxDim) {
          if (w > h) { h = Math.round(h * maxDim / w); w = maxDim; }
          else { w = Math.round(w * maxDim / h); h = maxDim; }
        }
        canvas.width = w;
        canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        let quality = 0.8;
        let dataUrl = canvas.toDataURL('image/webp', quality);
        if (dataUrl.length > MAX_IMG_SIZE) {
          dataUrl = canvas.toDataURL('image/jpeg', 0.6);
        }
        resolve(dataUrl);
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function renderImageList() {
  const list = $('img-list');
  const hint = $('img-hint');
  list.innerHTML = '';
  images.forEach((src, i) => {
    const thumb = document.createElement('div');
    thumb.className = 'img-thumb';
    thumb.innerHTML = `<img src="${src}" alt="Image ${i + 1}"><button class="img-remove" aria-label="Remove image ${i + 1}">вң•</button><div class="img-position">${i + 1}</div>`;
    thumb.querySelector('.img-remove').addEventListener('click', () => {
      images.splice(i, 1);
      renderImageList();
      renderMarquee();
      restartAnimation();
      scheduleSave();
    });
    list.appendChild(thumb);
  });
  hint.textContent = images.length ? `${images.length}/${MAX_IMAGES} images` : 'PNG, JPG, GIF, WebP';
}

$('img-file-input').addEventListener('change', async e => {
  const files = Array.from(e.target.files);
  for (const file of files) {
    if (images.length >= MAX_IMAGES) break;
    if (!file.type.startsWith('image/')) continue;
    try {
      const dataUrl = await resizeImage(file);
      images.push(dataUrl);
    } catch (err) {}
  }
  e.target.value = '';
  renderImageList();
  renderMarquee();
  restartAnimation();
  scheduleSave();
});

// Image placement buttons
document.querySelectorAll('.img-placement-row .btn-option').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.img-placement-row .btn-option').forEach(b => {
      b.classList.remove('active');
      b.setAttribute('aria-checked', 'false');
    });
    btn.classList.add('active');
    btn.setAttribute('aria-checked', 'true');
    imgPlacement = btn.dataset.placement;
    renderMarquee();
    restartAnimation();
    scheduleSave();
  });
});

// в”Җв”Җ Persist to localStorage (debounced) в”Җв”Җ
function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveState, 300);
}

function saveState() {
  const data = {
    msg: $('msg-input').value,
    textColor: $('text-color').value,
    glowColor: $('glow-color').value,
    bgColor: $('bg-color').value,
    fontSize: $('font-size').value,
    speed: $('scroll-speed').value,
    letterSpacing: $('letter-spacing').value,
    font: document.querySelector('#font-group .btn-option.active')?.dataset.font,
    dir: state.dir,
    effect: state.effect,
    images: images,
    imgPlacement: imgPlacement,
    rotation: rotation,
    ...state
  };
  try { localStorage.setItem('led-marquee', JSON.stringify(data)); } catch (e) {}
}

function loadState() {
  let data;
  try { data = JSON.parse(localStorage.getItem('led-marquee')); } catch (e) {}
  if (!data) return;

  const msg = data.msg || 'HELLO WORLD';
  $('msg-input').value = msg;

  state.dots = data.dots !== false;
  state.glow = data.glow !== false;
  state.bold = data.bold !== false;
  state.upper = data.upper !== false;
  state.mirror = !!data.mirror;
  state.effect = data.effect || 'none';
  state.dir = data.dir || 'scroll-left';

  updateDisplayText(msg);

  if (data.textColor) {
    const glowColor = data.glowColor || data.textColor;
    setColors(data.textColor, glowColor, data.bgColor || '#111111');
    $('text-color').value = data.textColor;
    $('glow-color').value = glowColor;
    $('bg-color').value = data.bgColor || '#111111';
  }

  if (data.fontSize) {
    $('font-size').value = data.fontSize;
    $('font-size-val').textContent = data.fontSize + 'px';
    document.documentElement.style.setProperty('--font-size', data.fontSize + 'px');
  }
  if (data.speed) {
    const v = parseInt(data.speed);
    $('scroll-speed').value = v;
    $('scroll-speed-val').textContent = speedLabel(v);
    document.documentElement.style.setProperty('--scroll-duration', speedToDuration(v) + 's');
  }
  if (data.letterSpacing) {
    $('letter-spacing').value = data.letterSpacing;
    $('letter-spacing-val').textContent = data.letterSpacing + 'px';
    marqueeText.style.letterSpacing = data.letterSpacing + 'px';
  }
  if (data.font) {
    marqueeText.style.fontFamily = data.font;
    document.querySelectorAll('#font-group .btn-option').forEach(b => {
      const match = b.dataset.font === data.font;
      b.classList.toggle('active', match);
      b.setAttribute('aria-checked', match);
    });
  }

  ['dir-group', 'effect-group'].forEach(gid => {
    const key = gid === 'dir-group' ? 'dir' : 'effect';
    const val = state[key === 'dir' ? 'dir' : 'effect'];
    $(gid).querySelectorAll('.btn-option').forEach(b => {
      const attr = key === 'dir' ? 'data-dir' : 'data-effect';
      const match = b.getAttribute(attr) === val;
      b.classList.toggle('active', match);
      b.setAttribute('aria-checked', match);
    });
  });

  document.querySelectorAll('.toggle[role="switch"]').forEach(t => {
    t.setAttribute('aria-checked', !!state[t.dataset.key]);
  });

  if (data.rotation) {
    rotation = data.rotation;
  }

  if (Array.isArray(data.images)) {
    images = data.images;
    renderImageList();
  }
  if (data.imgPlacement) {
    imgPlacement = data.imgPlacement;
    document.querySelectorAll('.img-placement-row .btn-option').forEach(b => {
      const match = b.dataset.placement === imgPlacement;
      b.classList.toggle('active', match);
      b.setAttribute('aria-checked', match);
    });
  }

  marqueeText.style.fontWeight = state.bold ? '900' : '400';
  dotOverlay.classList.toggle('hidden', !state.dots);
  applyClasses();
  renderMarquee(msg);
}

loadState();
</script>
</body>
</html>
